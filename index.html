<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#198f48">
  <title>Study☆Star</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <button id="logo" class="logo" aria-label="保護者モードを開く">
        Study<span>☆</span>Star
        <small>合格を勝ち取る最強の自分へ</small>
      </button>
      <button class="icon-button" aria-label="お知らせ">🔔</button>
    </header>

    <section class="top-grid">
      <div class="avatar-card">
        <img src="kaito-advance.jpg" alt="KAITOアドヴァンス">
      </div>

      <div class="message-card">
        <small>★ KAITOアドヴァンス</small>
        <h1 id="greeting">こんにちは、海翔！</h1>
        <p id="adMessage">今日も最高のJumpにしよう！</p>
      </div>

      <div class="countdown-card">
        <small>受検まで</small>
        <strong id="days">あと--日</strong>
      </div>

      <div class="mission-card">
        <div class="mission-title">◎ 今日のミッション</div>
        <label><span>🎓 塾（夏期講習）15:50〜18:10</span></label>
        <label><span>📘 Challenge45</span><input type="checkbox"></label>
        <label><span>✏️ 読書15分</span><input type="checkbox"></label>
        <label><span>🌙 手伝い・読書</span><input type="checkbox"></label>
      </div>
    </section>

    <button id="challengeBtn" class="primary challenge">
      <span class="emoji">🚀</span>
      <span><strong>Challenge45を始める</strong><small>本番1回分の集中Jump！</small></span>
      <b>よし<br>行こう！</b>
      <i>›</i>
    </button>

    <button id="recordBtn" class="primary record">
      <span class="emoji">📖</span>
      <span><strong>学習時間を残す</strong><small>Challenge45以外の学習を記録しよう！</small></span>
      <i>›</i>
    </button>

    <section class="cards">
      <button class="card jump" data-title="Jump Sky">
        <div class="card-title">⭐ Jump Sky</div>
        <small>今日の星</small>
        <div id="stars" class="stars">☆ ☆ ☆ ☆ ☆</div>
        <p>今日もよく頑張ったね！<br>星を集めて、夜空をきれいにしよう♪</p>
        <div class="bar"><span id="jumpBar"></span></div>
      </button>

      <button class="card bank" data-title="Dream Bank">
        <div class="card-title">🏛 Dream Bank</div>
        <small>現在のポイント</small>
        <strong id="points">0 pt</strong>
        <p>目標まであと</p>
        <div class="bar orange"><span id="pointBar"></span></div>
        <small>ごほうびリストを見る ›</small>
      </button>
    </section>

    <section class="lower">
      <button class="panel" data-title="つぶやき帳">
        <div class="panel-title">🗒 つぶやき帳</div>
        <p>今日のつぶやきを書こう！</p>
        <small>タップして書いてみよう ✎</small>
      </button>

      <button class="panel" data-title="今後の予定">
        <div class="panel-title">🗓 今後の予定</div>
        <p>夏期講習や模試の予定を確認</p>
        <small>すべて見る ›</small>
      </button>
    </section>

    <nav class="nav">
      <button class="active">⌂<small>ホーム</small></button>
      <button>◷<small>記録</small></button>
      <button>☆<small>Jump Sky</small></button>
      <button>🏛<small>Dream Bank</small></button>
      <button>♙<small>メニュー</small></button>
    </nav>
  </main>


  <dialog id="categoryDialog">
    <form method="dialog" class="challenge-dialog">
      <h2>今回は何に挑戦する？</h2>
      <div id="categoryList" class="category-list"></div>
      <button value="cancel" class="cancel">戻る</button>
    </form>
  </dialog>

  <dialog id="timerDialog">
    <div class="challenge-dialog timer-panel">
      <small id="timerCategory"></small>
      <h2>Challenge45</h2>
      <div id="timerDisplay" class="timer-display">45:00</div>
      <p id="timerMessage">深呼吸して、集中Jump！</p>
      <div class="timer-actions">
        <button id="pauseTimer" class="cancel">一時停止</button>
        <button id="completeTimer">完了にする</button>
      </div>
      <button id="cancelTimer" class="text-button">中止して戻る</button>
    </div>
  </dialog>

  <dialog id="dialog">
    <div>
      <h2 id="dialogTitle"></h2>
      <p id="dialogText"></p>
      <button id="closeDialog">OK</button>
    </div>
  </dialog>

  <dialog id="parent">
    <form method="dialog">
      <h2>保護者モード</h2>
      <input id="password" type="password" inputmode="numeric" maxlength="6" placeholder="パスワード">
      <p id="error" hidden>パスワードが違います。</p>
      <button value="cancel" class="cancel">キャンセル</button>
      <button id="login">開く</button>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
